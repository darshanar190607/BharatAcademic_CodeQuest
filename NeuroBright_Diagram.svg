<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
    <!-- Definition for shadow and arrowhead -->
    <defs>
        <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
            <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
        </filter>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#2c3e50" />
        </marker>
    </defs>
    
    <!-- Background -->
    <rect width="100%" height="100%" fill="#ffffff" />
    
    <!-- Title -->
    <text x="300" y="40" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="bold" fill="#2c3e50" text-anchor="middle">Figure: NeuroBright Hardware Architecture</text>
    
    <!-- Human Box -->
    <rect x="225" y="80" width="150" height="60" rx="5" ry="5" fill="#f8f9fa" stroke="#adb5bd" stroke-width="2" filter="url(#shadow)" />
    <text x="300" y="110" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="bold" fill="#212529" text-anchor="middle">Human User</text>
    <text x="300" y="128" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#495057" text-anchor="middle">(Brainwaves/Signals)</text>
    
    <!-- BioAmp EXG Box -->
    <rect x="225" y="180" width="150" height="60" rx="5" ry="5" fill="#e3f2fd" stroke="#2196f3" stroke-width="2" filter="url(#shadow)" />
    <text x="300" y="210" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="bold" fill="#0d47a1" text-anchor="middle">BioAmp EXG Pill</text>
    <text x="300" y="228" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#1565c0" text-anchor="middle">(Biopotential Sensor)</text>

    <!-- Arduino R4 Box -->
    <rect x="225" y="280" width="150" height="60" rx="5" ry="5" fill="#e8f5e9" stroke="#4caf50" stroke-width="2" filter="url(#shadow)" />
    <text x="300" y="310" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="bold" fill="#1b5e20" text-anchor="middle">Arduino R4 Minima</text>
    <text x="300" y="328" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#2e7d32" text-anchor="middle">(14-bit ADC MCU)</text>

    <!-- PC/Backend Box -->
    <rect x="225" y="380" width="150" height="60" rx="5" ry="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" filter="url(#shadow)" />
    <text x="300" y="410" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="bold" fill="#4a148c" text-anchor="middle">Local Computer</text>
    <text x="300" y="428" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#6a1b9a" text-anchor="middle">(ML Inference Service)</text>

    <!-- Arrow 1 -->
    <line x1="300" y1="140" x2="300" y2="173" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow)" />
    <rect x="240" y="146" width="120" height="20" fill="#ffffff" />
    <text x="300" y="161" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#dc3545" text-anchor="middle" font-weight="bold">Analog ExG Signal</text>

    <!-- Arrow 2 -->
    <line x1="300" y1="240" x2="300" y2="273" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow)" />
    <rect x="240" y="246" width="120" height="20" fill="#ffffff" />
    <text x="300" y="261" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#dc3545" text-anchor="middle" font-weight="bold">Analog Pins (A0-A5)</text>

    <!-- Arrow 3 -->
    <line x1="300" y1="340" x2="300" y2="373" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow)" />
    <rect x="220" y="346" width="160" height="20" fill="#ffffff" />
    <text x="300" y="361" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#dc3545" text-anchor="middle" font-weight="bold">USB Serial (230,400 BPS)</text>

</svg>
